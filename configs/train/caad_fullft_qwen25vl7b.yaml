# =============================================================================
# CAAD — Full fine-tuning, Qwen2.5-VL-7B-Instruct
# Self-contained recipe. Same trainer as the LoRA recipe, just lora.enabled=false
# (teacher/init become separate frozen copies held by the trainer) — config, not
# a forked file. Use ZeRO-3 + offload for the 7B full-FT memory footprint.
# 1 node (4 GPU): GPU 0 = vLLM, GPUs 1-3 = ZeRO-3 training.
# Effective batch = per_device(1) x grad_accum(14) x num_generations(4) x 3 GPUs = 168
#   CFG=configs/train/caad_fullft_qwen25vl7b.yaml ACC=configs/accelerate/zero3.yaml \
#     bash scripts/train.sh
# =============================================================================

method: caad
seed: 7
deterministic: false
log_level: info

# where THIS run's checkpoints / logs / results / frozen-config are written.
# Point it at scratch on a cluster, e.g.
#   /capstor/scratch/cscs/ahsan600613/outputs/caad_fullft_qwen25vl7b
output_dir: /capstor/scratch/cscs/ahsan600613/outputs/caad_fullft_qwen25vl7b

model:
  name: Qwen/Qwen2.5-VL-7B-Instruct
  dtype: bfloat16
  attn_implementation: flash_attention_2
  gradient_checkpointing: true
  gradient_checkpointing_kwargs:
    use_reentrant: false
  max_pixels: 200704
  max_frames: 16

lora:
  enabled: false                   # full fine-tune; no adapters

caad:
  fkl_quantile: 0.10
  min_tokens_for_quantile: 24
  jsd_beta: 0.5
  lambda_l2: 0.5
  anchor_beta: 0.05                # CAAD's reference-KL weight (TRL's `beta` role)
  ema_decay: 0.999
  chunk_size: 64

train:
  learning_rate: 2.0e-6            # full-FT wants a smaller LR than LoRA
  lr_scheduler_type: cosine
  warmup_ratio: 0.1
  max_grad_norm: 1.0
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 14
  max_steps: 2000
  num_train_epochs: 1
  ema_every: 1
  save_steps: 200
  save_total_limit: 10
  logging_steps: 10
  logging_first_step: true

rollout:
  backend: vllm                    # vllm (prod) | hf (correct 1-GPU) | mock (smoke)
  sync_every: 50                   # push student weights into the vLLM worker every N opt steps
                                   # (vLLM weight-sync is an unwired seam — see rollout.py)
  num_generations: 4
  temperature: 1.0
  top_p: 1.0
  max_completion_length: 512
  gpu_mem_util: 0.85

eval:
  do_eval: false
  eval_steps: 0
  manifest: data/eval_manifest.jsonl
  samples: 200

data:
  manifest: data/train_manifest.jsonl
  video_root: null
  system_prompt: "You are a careful video question-answering assistant."

wandb:
  enabled: true
  project: caad
  run_name: caad-fullft-qwen25vl7b
  log_completions: false
  config: null

hub:
  enabled: false
  model_id: ""
  private: true
  push_every_n_steps: 200
